version: '3.8'

services:
  # 后端服务 (生产配置)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tasktree-backend-prod
    image: tasktree-backend:latest
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:////app/data/tasktree.db}
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=false
      - LOG_LEVEL=warning
      - PYTHONUNBUFFERED=1
    volumes:
      - tasktree-data:/app/data
      - tasktree-uploads:/app/uploads
      - tasktree-logs:/app/logs
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - tasktree-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # 前端服务 (生产配置)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tasktree-frontend-prod
    image: tasktree-frontend:latest
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - tasktree-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  tasktree-data:
    driver: local
  tasktree-uploads:
    driver: local
  tasktree-logs:
    driver: local

networks:
  tasktree-network:
    driver: bridge
